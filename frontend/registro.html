<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtuClass - Registro de Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('source/placeholder.jpeg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px; 
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(4px); 
            z-index: 1; 
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.95); 
            border: none;
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); 
            padding: 30px 40px;
            width: 100%;
            max-width: 480px; 
            position: relative;
            z-index: 2; 
            transition: transform 0.3s ease;
        }

        .brand-logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid #e1e8ed;
        }

        .input-group-text {
            background-color: #f8f9fa;
            border-radius: 10px 0 0 10px;
            border: 1px solid #e1e8ed;
            color: #6c757d;
        }

        .btn-primary {
            background-color: #4a6cf7;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #3554d1;
        }

        .login-footer {
            margin-top: 25px;
            color: #6c757d;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="login-overlay"></div>

    <div class="login-card">
        <div class="card-body">
            
            <div class="text-center">
                <img src="source/virtuclass_logo.png" alt="VirtuClass Logo" class="brand-logo">
                <h4 class="fw-bold text-dark mb-1">Crear una Cuenta</h4>
                <p class="text-muted small mb-4">Únete a nuestra plataforma educativa</p>
            </div>

            <form id="registroForm">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nombres" class="form-label text-secondary fw-semibold">Nombres</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="nombres" name="nombres" placeholder="Ej. Juan" required>
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="apellidos" class="form-label text-secondary fw-semibold">Apellidos</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="apellidos" name="apellidos" placeholder="Ej. Pérez" required>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label text-secondary fw-semibold">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email" placeholder="ejemplo@edu.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-secondary fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary shadow-sm" id="btnRegistro">
                        Registrarme
                    </button>
                    <a href="login.html" class="btn btn-outline-secondary">Ya tengo una cuenta</a>
                </div>

            </form>
            
            <div class="text-center login-footer">
                <p class="mb-0">&copy; 2026 VirtuClass. Plataforma Educativa.</p>
                <p class="mb-0 extra-small">Todos los derechos reservados.</p>
            </div>
            
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="toastMessage" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium text-white" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/registro.js"></script>
</body>
</html>
