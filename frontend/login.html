<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtuClass - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #4a6cf7;
            border: none;
        }
        .btn-primary:hover {
            background-color: #3554d1;
        }
        /* Ajuste responsivo para el logo */
        .brand-logo {
            max-width: 180px;
            height: auto;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                
                <div class="card login-card p-4">
                    <div class="card-body">
                        
                        <div class="text-center mb-4">
                            <img src="assets/images/virtuclass_logo.png" alt="Logo VirtuClass" class="brand-logo mb-2">
                            <p class="text-muted small">Plataforma Educativa Virtual</p>
                        </div>

                        <form id="loginForm">
                            
                            <div class="mb-3">
                                <label for="email" class="form-label text-secondary fw-semibold">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" placeholder="ejemplo@edu.com" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label text-secondary fw-semibold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold fs-6 shadow-sm">
                                    Iniciar Sesión
                                </button>
                            </div>

                        </form>
                        
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <p class="text-muted small">&copy; 2026 VirtuClass. Todos los derechos reservados.</p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/login.js"></script>
</body>
</html>
