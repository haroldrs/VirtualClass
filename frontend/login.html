<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtuClass - Portal de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        /* 1. FONDO DE IMAGEN A PANTALLA COMPLETA
           - d-flex centrará el contenido.
           - background-size: cover asegura que ocupe todo el espacio.
        */
        body {
            background-image: url('source/placeholder.jpeg'); /* Reemplaza con tu imagen real */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Mantiene el fondo quieto al hacer scroll */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px; /* Margen para pantallas pequeñas */
        }

        /*
           2. EFECTO GLASSMORFISMO (LA CAPA TRANSLÚCIDA)
           Este div se coloca detrás de la tarjeta para crear el efecto desenfocado
        */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.25); /* Capa oscura translúcida */
            backdrop-filter: blur(4px); /* Efecto de desenfoque (blur) */
            z-index: 1; /* Detrás de la tarjeta */
        }

        /*
           3. TARJETA DE INICIO DE SESIÓN
        */
        .login-card {
            background-color: rgba(255, 255, 255, 0.95); /* Blanco ligeramente translúcido */
            border: none;
            border-radius: 20px; /* Bordes muy redondeados */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); /* Sombra elegante */
            padding: 40px;
            width: 100%;
            max-width: 420px; /* Ancho máximo para que no se estire */
            position: relative;
            z-index: 2; /* Encima de la capa de desenfoque */
            transition: transform 0.3s ease;
        }

        /* Estilo del logo */
        .brand-logo {
            max-width: 160px;
            height: auto;
            margin-bottom: 25px;
        }

        /* Estilo para los campos de entrada */
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e1e8ed;
        }

        /* Estilo para los iconos dentro de los campos */
        .input-group-text {
            background-color: #f8f9fa;
            border-radius: 10px 0 0 10px;
            border: 1px solid #e1e8ed;
            color: #6c757d;
        }

        /* Botón de ingreso personalizado */
        .btn-primary {
            background-color: #4a6cf7;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #3554d1;
        }

        /* Pie de página dentro de la tarjeta */
        .login-footer {
            margin-top: 30px;
            color: #6c757d;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="login-overlay"></div>

    <div class="login-card">
        <div class="card-body">
            
            <div class="text-center">
                <img src="source/virtuclass_logo.png" alt="VirtuClass Logo" class="brand-logo">
                <h4 class="fw-bold text-dark mb-1">¡Bienvenido de nuevo!</h4>
                <p class="text-muted small mb-4">Ingresa tus credenciales para acceder</p>
            </div>

            <form id="loginForm">
                
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary fw-semibold">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email" placeholder="ejemplo@edu.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-secondary fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary shadow-sm">
                        Iniciar Sesión
                    </button>
                    <a href="registro.html" class="btn btn-outline-secondary">Crear una Cuenta Nueva</a>
                </div>

            </form>
            
            <div class="text-center login-footer">
                <p class="mb-0">&copy; 2026 VirtuClass. Plataforma Educativa.</p>
                <p class="mb-0 extra-small">Todos los derechos reservados.</p>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/login.js"></script>
</body>
</html>
